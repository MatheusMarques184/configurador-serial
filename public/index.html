<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Serial RS485</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- PAINEL ESQUERDO: Configurações -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                    Configurar
                </div>
            </div>

            <div class="sidebar-body">
                <!-- APN / Rede -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>📡 Rede / APN</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>APN</label>
                        <input type="text" id="apn" placeholder="ex: ss.algar.br,algar,algar">
                    </div>
                </div>

                <!-- Servidor Principal -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>🌐 Servidor Principal</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>Servidor</label>
                        <input type="text" id="server1" placeholder="ex: trx.voxd.com.br,9092">
                    </div>
                </div>

                <!-- Servidor Secundário -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>🌐 Servidor Secundário</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>Servidor</label>
                        <input type="text" id="server2" placeholder="ex: back.voxd.com.br,8081">
                    </div>
                </div>

                <!-- Timers -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>⏱ Transmissão</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>Angle transmitt<span class="field-info">heading</span></label>
                        <input type="text" id="anglesTrans" placeholder="20">

                        <label>Timer<span class="field-info">segundos</span></label>
                        <input type="text" id="timerTrans" placeholder="30,1800">
                    </div>
                </div>

                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>🌐 Marcadores</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>Odometro<span class="field-info">centenas de metro</span></label>
                        <input type="text" id="mileage" placeholder="ex: 200">

                        <label>Secsmeter<span class="field-info">segundos</span></label>
                        <input type="text" id="secondsMeter" placeholder="ex: 10000">
                    </div>
                </div>

                <!-- Velocidade -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>🚗 Velocidade</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>Speed Buzz<span class="field-info">km/h</span></label>
                        <input type="text" id="speed_buzz" placeholder="60">

                        <label>Overspeed relay 1</label>
                        <div class="toggle-row">
                            <input type="checkbox" id="overspeedRelay1" class="toggle">
                            <label for="overspeedRelay1" class="toggle-label"></label>
                            <span class="toggle-hint">bool</span>
                        </div>

                        <label>Overspeed relay 2</label>
                        <div class="toggle-row">
                            <input type="checkbox" id="overspeedRelay2" class="toggle">
                            <label for="overspeedRelay2" class="toggle-label"></label>
                            <span class="toggle-hint">bool</span>
                        </div>

                        <label>Speed punish<span class="field-info">km/h</span></label>
                        <input type="text" id="speed_punish" placeholder="20,60,0,0">
                    </div>
                </div>

                <!-- iButton -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>🔑 RFID</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>RFID<span class="field-info">km/h</span></label> 
                        <!-- Controla RFID. X = 2 ativo durante viagem / 1 ativo / 0 inativo -->
                        <input type="text" id="rfid" placeholder="fazer ainda">

                        <label>RFID relay 1</label>
                        <div class="toggle-row">
                            <input type="checkbox" id="rfidRelay1" class="toggle">
                            <label for="rfidRelay1" class="toggle-label"></label>
                            <span class="toggle-hint">bool</span>
                        </div>

                        <label>RFID relay 2</label>
                        <div class="toggle-row">
                            <input type="checkbox" id="rfidRelay2" class="toggle">
                            <label for="rfidRelay2" class="toggle-label"></label>
                            <span class="toggle-hint">bool</span>
                        </div>
                    </div>
                </div>

                <!-- Sistema -->
                <div class="config-group">
                    <div class="group-header" onclick="toggleGroup(this)">
                        <span>⚙️ Sistema</span>
                        <span class="chevron">▾</span>
                    </div>
                    <div class="group-body">
                        <label>Ignição virtual</label>
                        <div class="toggle-row">
                            <input type="checkbox" id="ignVirtual" class="toggle">
                            <label for="ignVirtual" class="toggle-label"></label>
                            <span class="toggle-hint">bool</span>
                        </div>
                    </div>
                </div>

            <div class="sidebar-footer">
                <button class="btn btn-secondary" onclick="lerConfiguracoes()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Ler do Dispositivo
                </button>
                <button class="btn btn-primary" onclick="enviarConfiguracoes()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Enviar ao Dispositivo
                </button>
            </div>
        </aside>

        <!-- PAINEL DIREITO: Terminal Serial -->
        <main id="main">
            <!-- Barra de Conexão -->
            <div id="connection-bar">
                <button id="btn-connect" class="btn btn-connect" onclick="toggleConnect()">Conectar</button>
                <div id="status-dot" class="status-dot disconnected" title="Desconectado"></div>
            </div>



            <!-- TAB: Terminal -->
            <div id="tab-terminal" class="tab-content active">
                <div id="terminal-log" onclick="terminalFocus()"></div>
                <div id="terminal-send-bar">
                    <div class="send-bar-left">
                        <span class="send-prefix">ID MSG:</span>
                        <input type="text" id="quick-idmsg" value="0x01" placeholder="0x01" class="hex-input small">
                        <span class="send-prefix">DEST:</span>
                        <input type="text" id="quick-dest" value="0x01" placeholder="0x01" class="hex-input small">
                        <span class="send-prefix">PAYLOAD (hex):</span>
                        <input type="text" id="quick-payload" placeholder="AA BB CC ..." class="hex-input">
                    </div>
                    <div class="send-bar-right">
                        <label class="send-opt"><input type="checkbox" id="chk-hex-mode" checked> Montar RS485</label>
                        <button class="btn btn-send" onclick="sendFromTerminal()">
                            Enviar ▶
                        </button>
                        <button class="btn btn-danger-sm" onclick="clearTerminal()">Limpar</button>
                    </div>
                </div>
            </div>



            <!-- Barra de Status -->
            <div id="status-bar">
                <span id="status-text">Desconectado</span>
                <span id="stats-text"></span>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
